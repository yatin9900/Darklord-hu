<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shreya 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
    --pink:#ffafbd;
    --rose:#ffc3a0;
    --accent:#d63384;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body,html{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,var(--pink),var(--rose));
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ❤️ Canvas Hearts (Soft) */
#heart-canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
    opacity:.5;
}

/* Envelope */
#envelope-wrapper{
    position:relative;
    z-index:100;
    text-align:center;
    cursor:pointer;
    padding:20px;
}

.envelope{
    width:240px;
    height:150px;
    background:#f08080;
    border-radius:0 0 12px 12px;
    position:relative;
    box-shadow:0 15px 25px rgba(0,0,0,.25);
    margin:auto;
}

.envelope::before{
    content:'';
    position:absolute;
    top:-90px;
    left:0;
    border-left:120px solid transparent;
    border-right:120px solid transparent;
    border-bottom:90px solid #f08080;
    transform-origin:bottom;
    transition:.5s;
}

.envelope.open::before{
    transform:rotateX(180deg);
}

/* Slides */
.slide{
    position:absolute;
    width:95%;
    max-width:420px;
    display:none;
    z-index:10;
    flex-direction:column;
    align-items:center;
}

.active-slide{
    display:flex !important;
    animation:fadeIn .7s forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(.95);}
    to{opacity:1;transform:scale(1);}
}

.outer-box{
    width:100%;
    background:rgba(255,255,255,.96);
    padding:20px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    backdrop-filter:blur(12px);
    text-align:center;
}

/* 🔥 Bigger Image Box */
.inner-img{
    width:100%;
    height:260px;              /* Increased */
    border-radius:18px;
    object-fit:cover;
    margin-bottom:18px;
    border:3px solid #fff;
}

/* Make even bigger on tall phones */
@media(min-height:700px){
    .inner-img{
        height:300px;
    }
}

.romantic-font{
    font-family:'Dancing Script',cursive;
    font-size:2rem;
    color:var(--accent);
    margin-bottom:12px;
}

.btn{
    display:none;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:13px 28px;
    border-radius:50px;
    margin-top:18px;
    font-weight:bold;
    cursor:pointer;
}

/* Slide 3 */
.msg-box{
    position:relative;
    width:100%;
    height:60px;
    margin:12px 0;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.msg-hidden-text{
    font-size:.9rem;
    color:#444;
    font-weight:500;
    padding:0 12px;
    text-align:center;
}

.msg-cover{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:var(--accent);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.6s;
    z-index:2;
}

.msg-cover.reveal{
    transform:translateX(-100%);
}

/* Overlay */
#overlay{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:92%;
    background:#fff;
    border-radius:35px 35px 0 0;
    padding:30px 20px;
    transition:.6s;
    z-index:200;
    overflow-y:auto;
    text-align:center;
}

.overlay-open{
    bottom:0 !important;
}

.text-container{
    background:#fff0f3;
    padding:22px;
    border-radius:18px;
    border-left:6px solid var(--accent);
    text-align:left;
    margin:20px 0;
}

#from-tag{
    opacity:0;
    font-size:2.5rem;
    transition:1.5s;
    color:var(--accent);
    margin-top:25px;
}
</style>
</head>

<body>

<canvas id="heart-canvas"></canvas>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div id="envelope-wrapper" onclick="init()">
<div class="envelope" id="env">
<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.7rem;">💌</div>
</div>
<p style="color:white;margin-top:15px;font-weight:bold;">Tap to open Shreya's Letter</p>
</div>

<div class="slide" id="s1">
<div class="outer-box">
<img src="image1.gif" class="inner-img">
<div class="romantic-font" id="t1a"></div>
<div id="t1b" style="font-size:1rem;color:#555;"></div>
<button class="btn" id="b1" onclick="go(2)">Continue</button>
</div>
</div>

<div class="slide" id="s2">
<div class="outer-box">
<img src="image2.jpg" class="inner-img">
<div id="t2" style="font-size:1rem;color:#555;"></div>
<button class="btn" id="b2" onclick="go(3)">Next →</button>
</div>
</div>

<div class="slide" id="s3">
<div class="romantic-font">Little things for you</div>

<div class="msg-box">
<div class="msg-hidden-text">I messed up.. I'm really sorry.</div>
<div class="msg-cover" onclick="reveal(this)">Message 1</div>
</div>

<div class="msg-box">
<div class="msg-hidden-text">I promise I'll be better for you.</div>
<div class="msg-cover" onclick="reveal(this)">Message 2</div>
</div>

<div class="msg-box">
<div class="msg-hidden-text">You mean so much to me.</div>
<div class="msg-cover" onclick="reveal(this)">Message 3</div>
</div>

<button class="btn" id="b3" onclick="go(4)">My Message →</button>
</div>

<div class="slide" id="s4">
<div class="outer-box" onclick="showMsg(event)">
<img src="image3.gif" class="inner-img">
<div class="romantic-font">From my heart</div>
<p><strong>Tap to read my message 💌</strong></p>
</div>
</div>

<div id="overlay" onclick="showMsg(event)">
<h2 class="romantic-font">I am sorry</h2>
<div class="text-container">
<div id="final-text" style="line-height:1.8;color:#444;"></div>
</div>
<div id="from-tag" class="romantic-font">From Darku</div>
</div>

<script>
let revCount=0;
let isTransitioning=false;
let messageTyped=false;
const music=document.getElementById('music');

function init(){
document.getElementById('env').classList.add('open');
if(music.paused){music.play().catch(()=>{});}
setTimeout(()=>{
document.getElementById('envelope-wrapper').style.display='none';
document.getElementById('s1').classList.add('active-slide');
type("t1a","Hey Shreya,",90,()=>{
type("t1b","Can we talk for a moment? There's something important I want to tell you.",75,()=>{
document.getElementById('b1').style.display='inline-block';
});
});
},800);
}

function type(id,txt,speed,cb){
let i=0;
const el=document.getElementById(id);
el.innerHTML="";
function run(){
if(i<txt.length){
el.innerHTML+=txt.charAt(i);
i++;
setTimeout(run,speed);
}else if(cb){cb();}
}
run();
}

function go(n){
if(isTransitioning)return;
isTransitioning=true;
document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active-slide'));
document.getElementById('s'+n).classList.add('active-slide');
setTimeout(()=>{isTransitioning=false;},600);

if(n===2){
type("t2","I know I've hurt you... And I've been feeling bad about it.",75,()=>{
document.getElementById('b2').style.display='inline-block';
});
}
}

function reveal(el){
el.classList.add('reveal');
revCount++;
if(revCount>=3){
document.getElementById('b3').style.display='inline-block';
}
}

function showMsg(event){
const ov=document.getElementById('overlay');
if(event && event.target.closest('.text-container'))return;
ov.classList.toggle('overlay-open');
if(ov.classList.contains('overlay-open') && !messageTyped){
const m="For hurting you and making you feel upset, I'm truly sorry. You matter to me more than I show. I promise to grow and be better every single day.";
type("final-text",m,65,()=>{
document.getElementById('from-tag').style.opacity="1";
});
messageTyped=true;
}
}

/* Smaller + Soft Hearts */
const canvas=document.getElementById("heart-canvas");
const ctx=canvas.getContext("2d");
let hearts=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function createHeart(){
return{
x:Math.random()*canvas.width,
y:canvas.height+20,
size:Math.random()*8+5,
speed:Math.random()*0.5+0.2,
opacity:Math.random()*0.2+0.1
};
}

for(let i=0;i<20;i++){hearts.push(createHeart());}

function drawHeart(x,y,size,opacity){
ctx.save();
ctx.translate(x,y);
ctx.scale(size/20,size/20);
ctx.beginPath();
ctx.moveTo(0,0);
ctx.bezierCurveTo(0,-3,-5,-15,-15,-15);
ctx.bezierCurveTo(-30,-15,-30,5,-30,5);
ctx.bezierCurveTo(-30,20,-15,30,0,40);
ctx.bezierCurveTo(15,30,30,20,30,5);
ctx.bezierCurveTo(30,5,30,-15,15,-15);
ctx.bezierCurveTo(5,-15,0,-3,0,0);
ctx.closePath();
ctx.fillStyle=`rgba(214,51,132,${opacity})`;
ctx.fill();
ctx.restore();
}

function animateHearts(){
ctx.clearRect(0,0,canvas.width,canvas.height);
hearts.forEach((heart,index)=>{
heart.y-=heart.speed;
heart.x+=Math.sin(heart.y*0.02)*0.3;
drawHeart(heart.x,heart.y,heart.size,heart.opacity);
if(heart.y<-50){hearts[index]=createHeart();}
});
requestAnimationFrame(animateHearts);
}
animateHearts();
</script>

</body>
</html>
