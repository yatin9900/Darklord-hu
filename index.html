<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shreya</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ffafbd;
            --rose: #ffc3a0;
            --accent: #d63384;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--pink), var(--rose));
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .falling-element {
            position: absolute; top: -10%; z-index: 0;
            user-select: none; pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .slide {
            position: absolute; width: 85%; max-width: 400px; text-align: center;
            opacity: 0; visibility: hidden;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            transform: scale(0.95); z-index: 10;
        }
        .active { opacity: 1; visibility: visible; transform: scale(1); }

        .outer-box {
            background: var(--glass);
            padding: 25px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .inner-image-box {
            width: 100%; height: 220px; background: #eee;
            border-radius: 15px; margin-bottom: 20px; overflow: hidden;
            border: 2px solid white;
        }
        .inner-image-box img { width: 100%; height: 100%; object-fit: cover; }

        .romantic-font {
            font-family: 'Dancing Script', cursive;
            font-size: 1.9rem; color: var(--accent); margin-bottom: 10px;
        }
        .typewriter { display: inline-block; min-height: 1.2em; }

        .next-btn {
            display: none;
            background: var(--accent); color: white; border: none;
            padding: 12px 30px; border-radius: 50px; margin-top: 20px;
            cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
            animation: fadeIn 1s forwards;
        }

        .msg-container {
            position: relative; width: 100%; margin: 12px 0;
            height: 60px; overflow: hidden; border-radius: 15px;
            background: white; display: flex; align-items: center;
            padding-left: 15px; box-shadow: 4px 4px 10px rgba(0,0,0,0.05);
        }
        .msg-content { font-size: 0.85rem; color: #555; font-weight: 500; text-align: left; }
        .cover-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); color: white; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            cursor: pointer; transition: transform 0.8s ease-in-out;
            border-radius: 15px; z-index: 2;
        }
        .slide-left { transform: translateX(-105%); }

        #message-overlay {
            position: fixed; bottom: -100%; left: 0;
            width: 100%; height: 85%; background: white;
            border-radius: 30px 30px 0 0; padding: 40px 20px;
            box-sizing: border-box; transition: bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; text-align: center; overflow-y: auto;
        }
        .show-message { bottom: 0 !important; }

        .styled-msg-box {
            background: #fff0f3; border-radius: 20px; padding: 20px;
            border-left: 5px solid var(--accent); margin-top: 10px; text-align: left;
        }

        #from-darku {
            opacity: 0; margin-top: 35px;
            font-size: 2.5rem; color: var(--accent);
            transition: opacity 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Envelope Styles --- */
        #envelope-wrapper {
            position: absolute;
            perspective: 1000px; /* For 3D transform */
            z-index: 20;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .envelope {
            width: 280px; height: 180px;
            background: linear-gradient(135deg, var(--pink), var(--rose));
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.8s ease-in-out, background 0.8s ease;
        }

        .envelope:before, .envelope:after {
            content: '';
            position: absolute;
            background: inherit;
        }

        /* Top flap */
        .envelope:before {
            width: 0; height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 90px solid white; /* Initial flap color */
            top: 0; left: 0;
            border-top-color: var(--accent); /* Outer flap color */
            border-radius: 10px 10px 0 0;
            transform-origin: top;
            transition: transform 0.8s ease-in-out, border-top-color 0.8s ease;
            z-index: 2;
        }

        /* Front flap (for the heart) */
        .envelope:after {
            width: 0; height: 0;
            border-left: 140px solid var(--rose);
            border-right: 140px solid var(--rose);
            border-bottom: 90px solid transparent;
            bottom: 0; left: 0;
            border-radius: 0 0 10px 10px;
            z-index: 1;
        }

        #heart {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            font-size: 3rem; color: white;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
            z-index: 3;
        }
        
        /* Envelope Open State */
        .envelope.open:before {
            transform: rotateX(180deg);
            border-top-color: var(--pink); /* Color when open */
        }
        .envelope.open #heart {
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
        }
        #open-text {
            color: white; font-weight: bold; font-size: 1.2rem; margin-top: 20px;
            opacity: 1; transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="animation-container"></div>

    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope">
            <span id="heart">💌</span>
        </div>
        <p id="open-text">Tap to Open</p>
    </div>

    <div class="slide" id="slide1">
        <div class="outer-box">
            <div class="inner-image-box"><img src="image1.gif" alt="Welcome GIF"></div>
            <h1 class="romantic-font typewriter" data-text="Hey Shreya,"></h1>
            <p class="typewriter" data-text="Can we talk for a moment? There's something important I want to tell you."></p>
            <br><button class="next-btn" onclick="nextSlide(2)">Continue</button>
        </div>
    </div>

    <div class="slide" id="slide2">
        <div class="outer-box">
            <div class="inner-image-box"><img src="image2.jpg" alt="Photo 2"></div>
            <p class="typewriter" data-text="I know I've hurt you... And I've been feeling bad about it."></p>
            <br><button class="next-btn" onclick="nextSlide(3)">Next &rarr;</button>
        </div>
    </div>

    <div class="slide" id="slide3">
        <div class="romantic-font typewriter" data-text="Little things I want to tell you"></div>
        <p style="font-size: 0.8rem;">Tap each box to open</p>
        <div class="msg-container"><div class="msg-content">I messed up.. and I am really sorry.</div><div class="cover-box" onclick="revealMsg(this)">Message 1</div></div>
        <div class="msg-container"><div class="msg-content">I promise I'll be better for you.</div><div class="cover-box" onclick="revealMsg(this)">Message 2</div></div>
        <div class="msg-container"><div class="msg-content">You mean so much to me.</div><div class="cover-box" onclick="revealMsg(this)">Message 3</div></div>
        <button class="next-btn" id="btn3" style="display:none;" onclick="nextSlide(4)">My Message &rarr;</button>
    </div>

    <div class="slide" id="slide4">
        <div class="romantic-font typewriter" data-text="From my heart"></div>
        <div class="outer-box" style="margin-top: 15px;" onclick="toggleMessage()">
            <div class="inner-image-box"><img src="image3.gif" alt="GIF 3"></div>
            <p><strong>Tap to read my message 💌</strong></p>
        </div>
    </div>

    <div id="message-overlay" onclick="toggleMessage()">
        <h2 class="romantic-font">I am sorry</h2>
        <div class="styled-msg-box">
            <div id="long-message" style="line-height: 1.7; color: #555; font-size: 0.95rem;"></div>
        </div>
        <div id="from-darku" class="romantic-font">From Darku</div>
        <p style="font-size: 0.7rem; color: #ccc; margin-top: 20px;">(Tap anywhere to close)</p>
    </div>

    <script>
        let revealedCount = 0;

        // Envelope Opening Logic
        function openEnvelope() {
            const envelope = document.querySelector('.envelope');
            const envelopeWrapper = document.getElementById('envelope-wrapper');
            const music = document.getElementById('bgMusic');
            const slide1 = document.getElementById('slide1');

            envelope.classList.add('open'); // Open the flap
            document.getElementById('heart').style.opacity = '0'; // Hide heart
            document.getElementById('open-text').style.opacity = '0'; // Hide text

            music.play().catch(e => { console.log("Music play failed:", e); });

            // After envelope animation, fade out envelope and show first slide
            setTimeout(() => {
                envelopeWrapper.style.opacity = '0'; // Fade out envelope
                slide1.classList.add('active'); // Show first message slide
                startSlideAnimations('slide1'); // Start typewriter on first message
            }, 1000); // Duration matches envelope open transition
        }


        // --- Other Scripts Same as Before ---
        function createFallingElement() {
            const container = document.getElementById('animation-container');
            const el = document.createElement('div');
            el.classList.add('falling-element');
            const items = ['🌸', '❤️', '🌹', '✨'];
            el.innerHTML = items[Math.floor(Math.random() * items.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = Math.random() * 15 + 15 + 'px';
            el.style.animationDuration = Math.random() * 3 + 4 + 's';
            el.style.opacity = Math.random() * 0.5 + 0.3;
            container.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }
        setInterval(createFallingElement, 350);

        function typeWriter(element, text, speed, callback) {
            let i = 0; element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; setTimeout(type, speed);
                } else if (callback) { callback(); }
            }
            type();
        }

        function startSlideAnimations(containerId) {
            const elements = document.querySelectorAll(`#${containerId} .typewriter`);
            const btn = document.querySelector(`#${containerId} .next-btn`);
            if(elements.length > 0) {
                typeWriter(elements[0], elements[0].getAttribute('data-text'), 50, () => {
                    if(elements[1]) {
                        typeWriter(elements[1], elements[1].getAttribute('data-text'), 50, () => {
                            if(btn) btn.style.display = 'inline-block';
                        });
                    } else if(btn) { btn.style.display = 'inline-block'; }
                });
            }
        }

        // Renamed nextSlide(2) to startExperience(2) for first slide
        // function startExperience(n) { } // Not needed now, envelope handles it

        function nextSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            setTimeout(() => {
                const next = document.getElementById('slide' + n);
                next.classList.add('active');
                startSlideAnimations('slide' + n);
            }, 600);
        }

        function revealMsg(el) {
            el.classList.add('slide-left');
            revealedCount++;
            if(revealedCount >= 3) {
                setTimeout(() => { document.getElementById('btn3').style.display = 'inline-block'; }, 800);
            }
        }

        function toggleMessage() {
            const overlay = document.getElementById('message-overlay');
            overlay.classList.toggle('show-message');
            if(overlay.classList.contains('show-message')) {
                const msg = "For hurting you and making you feel upset, I'm truly sorry. I never wanted to be the reason behind your tears or your silence. You matter to me more than I always manage to show, and I hate that I let you down. I promise to grow, to listen, and to be better for you every single day. Thank you for staying, for caring, and for being you. I'm really trying... and I hope you can forgive me.";
                const darku = document.getElementById('from-darku');
                darku.style.opacity = "0";
                setTimeout(() => {
                    typeWriter(document.getElementById('long-message'), msg, 40, () => {
                        setTimeout(() => { darku.style.opacity = "1"; }, 1000);
                    });
                }, 800);
            }
        }
    </script>
</body>
</html>
